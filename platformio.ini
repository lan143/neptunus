[env:kc868a6]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters =
    direct
    colorize
    esp32_exception_decoder
board_build.filesystem = littlefs
lib_deps =
    ESP32Async/ESPAsyncWebServer
    ArduinoJSON
    FS
    iarduino_Modbus
    https://github.com/lan143/ed-mqtt
    https://github.com/lan143/ed-config
    https://github.com/lan143/ed-utils
    https://github.com/lan143/ed-ha
    https://github.com/lan143/ed-healthcheck
    https://github.com/lan143/ed-network
    PCF8574
build_flags=
    -Wshadow
    -DCORE_DEBUG_LEVEL=5
    -DCONFIG_LOG_COLORS=1
    -DCONFIG_HEAP_POISONING_LIGHT=y

[env:kc868a6_ota]
extends = env:kc868a6
upload_protocol = espota
upload_port = 192.168.1.47
upload_flags = --auth=somestrongpassword 
